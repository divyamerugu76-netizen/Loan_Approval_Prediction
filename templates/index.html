<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>
</head>
<body>
    <h2>Loan Approval Prediction</h2>

    <form action="/predict" method="post">
        Salary: <input type="text" name="salary"><br><br>
        Credit Score: <input type="text" name="credit_score"><br><br>
        Loan Amount: <input type="text" name="loan_amount"><br><br>
        Employment Status (1=Employed, 0=Unemployed): <input type="text" name="employment_status"><br><br>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

</body>
</html>
